apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rrq-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Joel-Ajayi/rrq-gitops.git
    targetRevision: HEAD
    path: rrq/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: rrq
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
