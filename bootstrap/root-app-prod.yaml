apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Joel-Ajayi/rrq-gitops.git' # Placeholder URL, change as needed
    targetRevision: HEAD
    path: apps/prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
