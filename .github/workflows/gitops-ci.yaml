name: GitOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  manifests:
    name: Kustomize render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
      - name: Render App of Apps Configurations
        run: |
          kubectl kustomize bootstrap/ || echo "bootstrap/ has no kustomization.yaml, skipping"
      - name: Render dev + prod overlays
        run: |
          kustomize build rrq/overlays/dev  > /dev/null
          kustomize build rrq/overlays/prod > /dev/null
