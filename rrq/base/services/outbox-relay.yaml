# Outbox relay: tails the events table and publishes unpublished rows to Kafka.
# Leader-elected (Postgres advisory lock), so extra replicas are warm standbys.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-relay
  namespace: rrq
  labels:
    app.kubernetes.io/name: outbox-relay
    app.kubernetes.io/part-of: rrq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: outbox-relay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: outbox-relay
        app.kubernetes.io/part-of: rrq
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: outbox-relay
          image: rrq/outbox-relay:dev
          imagePullPolicy: Never
          ports:
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef: { name: rrq-config }
            - secretRef: { name: rrq-secrets }
          env:
            - name: MERCHANTS_DB_URI
              valueFrom: { secretKeyRef: { name: merchants-db-app, key: uri } }
            - name: SHARD_A_URI
              valueFrom: { secretKeyRef: { name: shard-a-app, key: uri } }
            - name: SHARD_B_URI
              valueFrom: { secretKeyRef: { name: shard-b-app, key: uri } }
          # Drain in-flight publishes before exit.
          lifecycle:
            preStop:
              exec: { command: ["sleep", "5"] }
          resources:
            requests: { cpu: "50m",  memory: 64Mi }
            limits:   { cpu: "250m", memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: outbox-relay-metrics
  namespace: rrq
  labels:
    app.kubernetes.io/name: outbox-relay
    app.kubernetes.io/part-of: rrq
spec:
  selector:
    app.kubernetes.io/name: outbox-relay
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
