apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-relay
  namespace: rrq
  labels:
    app.kubernetes.io/name: outbox-relay
    app.kubernetes.io/part-of: rrq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: outbox-relay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: outbox-relay
        app.kubernetes.io/part-of: rrq
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: outbox-relay
        image: rrq/outbox-relay:dev
        imagePullPolicy: Never
        ports:
        - name: metrics
          containerPort: 9090
        envFrom:
        - configMapRef:
            name: rrq-config
        - secretRef:
            name: rrq-secrets
        env:
        - name: MERCHANTS_DB_URI
          valueFrom:
            secretKeyRef:
              name: merchants-db-app
              key: uri
        - name: SHARD_A_URI
          valueFrom:
            secretKeyRef:
              name: shard-a-app
              key: uri
        - name: SHARD_B_URI
          valueFrom:
            secretKeyRef:
              name: shard-b-app
              key: uri
        lifecycle:
          preStop:
            exec:
              command:
              - sleep
              - '5'
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - outbox-relay
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: outbox-relay-metrics
  namespace: rrq
  labels:
    app.kubernetes.io/name: outbox-relay
    app.kubernetes.io/part-of: rrq
spec:
  selector:
    app.kubernetes.io/name: outbox-relay
  ports:
  - name: metrics
    port: 9090
    targetPort: metrics
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: outbox-relay
  namespace: rrq
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: outbox-relay
