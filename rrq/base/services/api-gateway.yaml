apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: rrq
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: rrq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: rrq
    spec:
      containers:
        - name: api-gateway
          image: rrq/api-gateway:dev
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: rrq-config
            - secretRef:
                name: rrq-secrets
          env:
            - name: MERCHANTS_DB_URI
              valueFrom:
                secretKeyRef:
                  name: merchants-db-app
                  key: uri
            - name: SHARD_A_URI
              valueFrom:
                secretKeyRef:
                  name: shard-a-app
                  key: uri
            - name: SHARD_B_URI
              valueFrom:
                secretKeyRef:
                  name: shard-b-app
                  key: uri
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - api-gateway
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: rrq
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: rrq
spec:
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics
---
# controls scaling based on LOAD
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: rrq
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# controls availability during DISRUPTIONS (e.g. node maintenance)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway
  namespace: rrq
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
