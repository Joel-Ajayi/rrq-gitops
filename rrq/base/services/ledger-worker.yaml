# Ledger worker: consumes the `jobs` topic and posts double-entry transfers.
# Scaled by Kafka consumer-group lag via KEDA.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-worker
  namespace: rrq
  labels:
    app.kubernetes.io/name: ledger-worker
    app.kubernetes.io/part-of: rrq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ledger-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ledger-worker
        app.kubernetes.io/part-of: rrq
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ledger-worker
          image: rrq/ledger-worker:dev
          imagePullPolicy: Never
          ports:
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef: { name: rrq-config }
            - secretRef: { name: rrq-secrets }
          env:
            - name: MERCHANTS_DB_URI
              valueFrom: { secretKeyRef: { name: merchants-db-app, key: uri } }
            - name: SHARD_A_URI
              valueFrom: { secretKeyRef: { name: shard-a-app, key: uri } }
            - name: SHARD_B_URI
              valueFrom: { secretKeyRef: { name: shard-b-app, key: uri } }
          # Finish the in-flight posting txn before exit (no double-post).
          lifecycle:
            preStop:
              exec: { command: ["sleep", "5"] }
          resources:
            requests: { cpu: "100m", memory: 128Mi }
            limits:   { cpu: "500m", memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-worker-metrics
  namespace: rrq
  labels:
    app.kubernetes.io/name: ledger-worker
    app.kubernetes.io/part-of: rrq
spec:
  selector:
    app.kubernetes.io/name: ledger-worker
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
---
# Scale on `jobs` lag. Needs KEDA installed (make addons).
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ledger-worker
  namespace: rrq
spec:
  scaleTargetRef:
    name: ledger-worker
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: rrq-kafka-bootstrap.rrq.svc.cluster.local:9092
        consumerGroup: ledger-worker
        topic: jobs
        lagThreshold: "100"
        offsetResetPolicy: earliest
