# Fraud worker: consumes `jobs` as a separate group, runs velocity checks in
# Redis, freezes wallets on anomaly. Detective control, off the money path.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-worker
  namespace: rrq
  labels:

    app.kubernetes.io/name: fraud-worker
    app.kubernetes.io/part-of: rrq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fraud-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fraud-worker
        app.kubernetes.io/part-of: rrq
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: fraud-worker
          image: rrq/fraud-worker:dev
          imagePullPolicy: Never
          ports:
            - name: metrics
              containerPort: 9090
          envFrom:
            - configMapRef: { name: rrq-config }
            - secretRef: { name: rrq-secrets }
          env:
            - name: MERCHANTS_DB_URI
              valueFrom: { secretKeyRef: { name: merchants-db-app, key: uri } }
            - name: SHARD_A_URI
              valueFrom: { secretKeyRef: { name: shard-a-app, key: uri } }
            - name: SHARD_B_URI
              valueFrom: { secretKeyRef: { name: shard-b-app, key: uri } }
          resources:
            requests: { cpu: "50m", memory: 96Mi }
            limits: { cpu: "300m", memory: 192Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-worker-metrics
  namespace: rrq
  labels:
    app.kubernetes.io/name: fraud-worker
    app.kubernetes.io/part-of: rrq
spec:
  selector:
    app.kubernetes.io/name: fraud-worker
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
---
# Scale on `jobs` lag (separate consumer group from the ledger worker).
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: fraud-worker
  namespace: rrq
spec:
  scaleTargetRef:
    name: fraud-worker
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: rrq-kafka-bootstrap.rrq.svc.cluster.local:9092
        consumerGroup: fraud-worker
        topic: jobs
        lagThreshold: "200"
        offsetResetPolicy: earliest
