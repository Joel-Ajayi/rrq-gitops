apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-worker
  namespace: rrq
  labels:
    app.kubernetes.io/name: fraud-worker
    app.kubernetes.io/part-of: rrq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fraud-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fraud-worker
        app.kubernetes.io/part-of: rrq
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: fraud-worker
        image: rrq/fraud-worker:dev
        imagePullPolicy: Never
        ports:
        - name: metrics
          containerPort: 9090
        envFrom:
        - configMapRef:
            name: rrq-config
        - secretRef:
            name: rrq-secrets
        env:
        - name: MERCHANTS_DB_URI
          valueFrom:
            secretKeyRef:
              name: merchants-db-app
              key: uri
        - name: SHARD_A_URI
          valueFrom:
            secretKeyRef:
              name: shard-a-app
              key: uri
        - name: SHARD_B_URI
          valueFrom:
            secretKeyRef:
              name: shard-b-app
              key: uri
        resources:
          requests:
            cpu: 50m
            memory: 96Mi
          limits:
            cpu: 300m
            memory: 192Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - fraud-worker
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-worker-metrics
  namespace: rrq
  labels:
    app.kubernetes.io/name: fraud-worker
    app.kubernetes.io/part-of: rrq
spec:
  selector:
    app.kubernetes.io/name: fraud-worker
  ports:
  - name: metrics
    port: 9090
    targetPort: metrics
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: fraud-worker
  namespace: rrq
spec:
  scaleTargetRef:
    name: fraud-worker
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
  - type: kafka
    metadata:
      bootstrapServers: rrq-kafka-bootstrap.rrq.svc.cluster.local:9092
      consumerGroup: fraud-worker
      topic: jobs
      lagThreshold: '200'
      offsetResetPolicy: earliest
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fraud-worker
  namespace: rrq
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fraud-worker
