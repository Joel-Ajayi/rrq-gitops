apiVersion: batch/v1
kind: CronJob
metadata:
  name: recon-worker
  namespace: rrq
  labels:
    app.kubernetes.io/name: recon-worker
    app.kubernetes.io/part-of: rrq
spec:
  schedule: '*/15 * * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: recon-worker
            app.kubernetes.io/part-of: rrq
        spec:
          restartPolicy: Never
          containers:
          - name: recon-worker
            image: rrq/recon-worker:dev
            imagePullPolicy: Never
            envFrom:
            - configMapRef:
                name: rrq-config
            - secretRef:
                name: rrq-secrets
            env:
            - name: MERCHANTS_DB_URI
              valueFrom:
                secretKeyRef:
                  name: merchants-db-app
                  key: uri
            - name: SHARD_A_URI
              valueFrom:
                secretKeyRef:
                  name: shard-a-app
                  key: uri
            - name: SHARD_B_URI
              valueFrom:
                secretKeyRef:
                  name: shard-b-app
                  key: uri
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                - ALL
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
