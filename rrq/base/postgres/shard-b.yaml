# Ledger shard B: data for merchants with shard_id='shard-b'.
# A shard-a <-> shard-b transfer is the cross-shard (clearing-saga) case.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: shard-b
  namespace: rrq
  labels:
    app.kubernetes.io/part-of: rrq
    rrq.dev/role: ledger-shard
    rrq.dev/shard-id: shard-b
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  primaryUpdateStrategy: unsupervised
  bootstrap:
    initdb:
      database: rrq
      owner: rrq_app                 # CNPG generates the Secret `shard-b-app`
  storage:
    size: 10Gi
  resources:
    requests: { cpu: "250m", memory: 512Mi }
    limits:   { cpu: "1",    memory: 1Gi }
  postgresql:
    parameters:
      max_connections: "200"
