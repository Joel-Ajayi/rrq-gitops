# Strimzi-managed Kafka, KRaft mode (no ZooKeeper).
# NodePool = the pods; Kafka = the cluster. Bootstrap: rrq-kafka-bootstrap.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: broker
  namespace: rrq
  labels:
    strimzi.io/cluster: rrq
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 20Gi
        deleteClaim: false
        kraftMetadata: shared
  resources:
    requests: { cpu: "250m", memory: 1Gi }
    limits: { cpu: "1", memory: 2Gi }
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: rrq
  namespace: rrq
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 3.8.0
    metadataVersion: 3.8-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal #loadbalancer for external access; internal for in-cluster access.
        tls: false #true when fully encrypted pathway using TLS certificates for secure internal microservices transferring sensitive data across different namespaces.
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}
    userOperator: {}
