# Prod: ≥2 of everything (no single point of failure).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-relay
  namespace: rrq
spec:
  replicas: 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-dashboard
  namespace: rrq
spec:
  replicas: 2
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: rrq
spec:
  minReplicas: 2
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: broker
  namespace: rrq
spec:
  replicas: 3
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: rrq
  namespace: rrq
spec:
  kafka:
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: jobs
  namespace: rrq
spec:
  replicas: 3
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: notify
  namespace: rrq
spec:
  replicas: 3
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: merchants-db
  namespace: rrq
spec:
  instances: 2
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: shard-a
  namespace: rrq
spec:
  instances: 2
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: shard-b
  namespace: rrq
spec:
  instances: 2
