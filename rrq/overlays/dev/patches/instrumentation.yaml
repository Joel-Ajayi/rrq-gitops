# Dev: inject the Go auto-instrumentation agent into Go workloads.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: rrq
spec:
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-go: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-relay
  namespace: rrq
spec:
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-go: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-worker
  namespace: rrq
spec:
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-go: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-worker
  namespace: rrq
spec:
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-go: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-worker
  namespace: rrq
spec:
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-go: "true"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: recon-worker
  namespace: rrq
spec:
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            instrumentation.opentelemetry.io/inject-go: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-dashboard
  namespace: rrq
spec:
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-go: "true"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rrq-migrate
  namespace: rrq
spec:
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-go: "true"
